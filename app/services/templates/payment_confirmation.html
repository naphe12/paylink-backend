<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; background-color:#f5f6fa; padding:20px;">
    <div style="max-width:600px; margin:auto; background:#fff; border-radius:12px; padding:20px; box-shadow:0 3px 6px rgba(0,0,0,0.1);">
      <h2 style="color:#0066ff;">Paiement confirmé ✅</h2>
      <p>Bonjour <b>{{ user_name }}</b>,</p>
      <p>Votre paiement de <b>{{ amount }} {{ currency }}</b> a été traité avec succès sur PesaPaid.</p>
      <hr style="border:none; border-top:1px solid #ddd; margin:20px 0;">
      <p><b>ID Transaction :</b> {{ transaction_id }}</p>
      <p><b>Date :</b> {{ date }}</p>
      <p>Merci d’avoir utilisé <b>PesaPaid</b> 💙</p>
      <p style="font-size:12px; color:#666;">Ceci est un message automatique. Ne pas répondre.</p>
    </div>
  </body>
</html>
